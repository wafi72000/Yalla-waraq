name: اختبارات الهند

on:
  push:
    paths:
      - "hand/**"
      - ".github/workflows/hand-tests.yml"
  pull_request:
    paths:
      - "hand/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hand
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hand/package-lock.json
      - run: npm ci
      - run: npm test
