name: اختبارات البلوت

on:
  push:
    paths:
      - "baloot/**"
      - ".github/workflows/baloot-tests.yml"
  pull_request:
    paths:
      - "baloot/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baloot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: baloot/package-lock.json
      - run: npm ci
      - run: npm test
